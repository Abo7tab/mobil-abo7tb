name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # إنشاء google-services.json من Secret
    - name: Create google-services.json
      run: |
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    # رفع APK كـ Artifact
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FamilyGuard-Child-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
    
    - name: Rename APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/app-debug.apk release/FamilyGuard-Child-latest.apk

    # احذف أي Releases قديمة — نبقي release واحد فقط (latest)
    - name: Clean old releases
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
          gh release delete "$tag" --yes || true
          git push origin ":refs/tags/$tag" 2>/dev/null || true
        done

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Family Guard - Latest
        body: |
          ## 📱 Family Guard - Child App (Latest)

          ### 📥 التحميل:
          حمّل ملف APK من Assets

          ### 📋 Build Info:
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Date: ${{ github.event.head_commit.timestamp }}
        files: release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
